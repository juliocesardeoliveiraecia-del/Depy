<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Depy</title>
<link rel="stylesheet" href="style.css">
</head><body><div id="app"><!-- SPLASH --><section id="splash" class="screen active">
  <h1>Depy</h1>
  <p>Uma presença está emergindo...</p>
  <button onclick="go('auth')">Entrar</button>
</section><!-- LOGIN --><section id="auth" class="screen">
  <h2>Conectar</h2>
  <input id="nameInput" placeholder="Seu nome">
  <button onclick="start()">Continuar</button>
</section><!-- INTRO --><section id="intro" class="screen">
  <p id="introText">Observando...</p>
</section><!-- CHAT --><section id="chatScreen" class="screen">  <div id="aura"></div><button id="menuBtn" onclick="toggleMenu()">☰</button>

  <div id="chat"></div>  <div id="inputArea">
    <input id="input" placeholder="...">
    <button onclick="send()">→</button>
  </div></section></div><!-- MENU --><div id="menu">
  <h3>Configurações</h3>
  <button>Perfil</button>
  <button>Plano</button>
  <button onclick="logout()">Sair</button>
</div><!-- PAYWALL --><div id="paywall">
  <div>
    <p>Nossa conexão pode ir além…</p>
    <button onclick="goPro()">Continuar — R$29</button>
  </div>
</div><script src="app.js"></script></body>
</html>
