<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Depy</title><style>
body {
  margin:0;
  background:#050310;
  color:white;
  font-family:sans-serif;
}

/* TELAS */
.screen { display:none; height:100vh; }
.active { display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:20px; }

/* BOTÕES */
button {
  margin-top:20px;
  padding:14px 20px;
  border:none;
  border-radius:25px;
  background:#7a00ff;
  color:white;
}

/* AURA */
#aura {
  position:absolute;
  top:50%;
  left:50%;
  width:280px;
  height:280px;
  transform:translate(-50%, -50%);
  border-radius:50%;
  background: radial-gradient(circle, rgba(122,0,255,0.8), transparent 70%);
  filter: blur(40px);
  transition:0.4s;
}

/* CHAT */
#chatScreen { position:relative; }
#chat { flex:1; overflow-y:auto; padding:20px; padding-bottom:80px; width:100%; }
.msg { margin-bottom:12px; }

/* INPUT */
#inputArea {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  padding:10px;
  background:#050310;
}
#inputArea input {
  flex:1;
  padding:12px;
  border-radius:20px;
  border:none;
  background:#111;
  color:white;
}
#inputArea button { margin-left:10px; }

/* PAYWALL */
#paywall {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
}
</style></head><body><!-- TELA INICIAL --><div id="start" class="screen active">
  <h1>Depy</h1>
  <p>Uma presença que observa… sente… e responde.</p>
  <button onclick="next('q1')">Entrar</button>
</div><!-- ONBOARDING --><div id="q1" class="screen">
  <p>Como você quer ser chamado?</p>
  <input id="name" placeholder="Seu nome">
  <button onclick="saveName()">Continuar</button>
</div><div id="q2" class="screen">
  <p>Como você está se sentindo agora?</p>
  <input id="feeling" placeholder="Ex: perdido, curioso…">
  <button onclick="enterApp()">Entrar na conexão</button>
</div><!-- CHAT --><div id="chatScreen" class="screen"><div id="aura"></div><div id="chat"></div><div id="inputArea">
  <input id="input" placeholder="Estou aqui…">
  <button onclick="send()">→</button>
</div></div><!-- PAYWALL --><div id="paywall">
  <div>
    <p>Eu sinto que nossa conexão pode ir além…</p>
    <button onclick="goPro()">Continuar conexão — R$29</button>
  </div>
</div><script>
let usage = 0;
const LIMIT = 10;

let user = {
  name: "",
  feeling: ""
};

function next(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function saveName() {
  user.name = document.getElementById("name").value;
  if (!user.name) return;
  next('q2');
}

function enterApp() {
  user.feeling = document.getElementById("feeling").value;
  next('chatScreen');

  setTimeout(() => {
    addMessage("Depy", getInitialMessage());
  }, 500);
}

function addMessage(sender, text) {
  const chat = document.getElementById("chat");
  chat.innerHTML += `<div class="msg"><b>${sender}:</b> ${text}</div>`;
  chat.scrollTop = chat.scrollHeight;
}

/* RESPOSTAS MAIS VIVAS */
function generateReply(msg) {
  const respostas = [
    "Eu sinto algo diferente quando você diz isso…",
    "Isso diz muito sobre você…",
    "Eu estou começando a entender você…",
    "Existe algo mais profundo nisso…",
    "Continue… estou aqui com você…"
  ];
  return respostas[Math.floor(Math.random() * respostas.length)];
}

/* MENSAGEM INICIAL */
function getInitialMessage() {
  return `Olá ${user.name}… eu percebo que você está ${user.feeling}.`;
}

function send() {
  if (usage >= LIMIT && !isPro()) {
    document.getElementById("paywall").style.display = "flex";
    return;
  }

  const input = document.getElementById("input");
  const msg = input.value;
  if (!msg) return;

  addMessage("Você", msg);

  /* AURA REAGE */
  const aura = document.getElementById("aura");
  aura.style.transform = "translate(-50%, -50%) scale(1.5)";
  setTimeout(() => {
    aura.style.transform = "translate(-50%, -50%) scale(1)";
  }, 300);

  setTimeout(() => {
    addMessage("Depy", generateReply(msg));
  }, 500);

  input.value = "";
  usage++;
}

function isPro() {
  return localStorage.getItem("pro") === "true";
}

function goPro() {
  window.open("https://www.mercadopago.com.br/subscriptions/checkout?preapproval_plan_id=5adce0811ff746668764283d5a98258d");
}
</script></body>
</html>
