<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Depy</title><style>
body {
  margin:0;
  background:#050310;
  color:white;
  font-family:sans-serif;
}

/* TELAS */
.screen {
  display:none;
  height:100vh;
}

.active {
  display:flex;
  flex-direction:column;
}

/* HOME */
#home {
  justify-content:center;
  align-items:center;
  text-align:center;
}

#startBtn {
  margin-top:20px;
  padding:15px 25px;
  border:none;
  border-radius:30px;
  background:#7a00ff;
  color:white;
  font-size:16px;
}

/* AURA */
#aura {
  position:absolute;
  top:50%;
  left:50%;
  width:320px;
  height:320px;
  transform:translate(-50%, -50%);
  border-radius:50%;
  background: radial-gradient(circle, rgba(122,0,255,0.7), transparent 70%);
  filter: blur(50px);
  animation: pulse 4s infinite ease-in-out;
  z-index:1;
}

@keyframes pulse {
  0% { transform:translate(-50%, -50%) scale(1); opacity:0.6; }
  50% { transform:translate(-50%, -50%) scale(1.3); opacity:1; }
  100% { transform:translate(-50%, -50%) scale(1); opacity:0.6; }
}

/* CHAT */
#chatScreen {
  position:relative;
}

#chat {
  flex:1;
  overflow-y:auto;
  padding:20px;
  z-index:2;
}

.msg {
  margin-bottom:12px;
}

/* INPUT */
#inputArea {
  display:flex;
  padding:12px;
  z-index:2;
}

input {
  flex:1;
  padding:12px;
  border-radius:20px;
  border:none;
  background:#111;
  color:white;
}

button {
  margin-left:10px;
  padding:12px;
  border:none;
  border-radius:20px;
  background:#7a00ff;
  color:white;
}

/* PAYWALL */
#paywall {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  text-align:center;
  z-index:5;
}
</style></head><body><!-- HOME --><div id="home" class="screen active">
  <h1>Depy</h1>
  <p>Uma presença digital que está com você.</p>
  <button id="startBtn" onclick="start()">Entrar</button>
</div><!-- CHAT --><div id="chatScreen" class="screen">
  <div id="aura"></div>
  <div id="chat"></div>  <div id="inputArea">
    <input id="input" placeholder="Estou aqui…">
    <button onclick="send()">→</button>
  </div>
</div><!-- PAYWALL --><div id="paywall">
  <div>
    <p>Você atingiu o limite da conexão…</p>
    <button onclick="goPro()">Aprofundar conexão — R$29</button>
  </div>
</div><script>
let usage = 0;
const LIMIT = 10;

function start() {
  document.getElementById("home").classList.remove("active");
  document.getElementById("chatScreen").classList.add("active");
}

function send() {
  if (usage >= LIMIT && !isPro()) {
    document.getElementById("paywall").style.display = "flex";
    return;
  }

  const input = document.getElementById("input");
  const msg = input.value;

  if (!msg) return;

  const chat = document.getElementById("chat");

  chat.innerHTML += `<div class="msg">Você: ${msg}</div>`;

  setTimeout(() => {
    chat.innerHTML += `<div class="msg"><b>Depy:</b> Eu estou aqui com você.</div>`;
    chat.scrollTop = chat.scrollHeight;
  }, 400);

  input.value = "";
  usage++;
}

function isPro() {
  return localStorage.getItem("pro") === "true";
}

function goPro() {
  window.open("https://www.mercadopago.com.br/subscriptions/checkout?preapproval_plan_id=5adce0811ff746668764283d5a98258d");
}
</script></body>
</html>
