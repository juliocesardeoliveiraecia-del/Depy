<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Depy</title><style>
body {
  margin:0;
  background:#050310;
  color:white;
  font-family:sans-serif;
}

/* TELAS */
.screen {
  display:none;
  height:100vh;
}

.active {
  display:flex;
  flex-direction:column;
}

/* LOGIN */
#login {
  justify-content:center;
  align-items:center;
  padding:20px;
}

input {
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:12px;
  border:none;
  background:#111;
  color:white;
}

/* BOTÕES */
button {
  margin-top:15px;
  padding:14px;
  border:none;
  border-radius:20px;
  background:#7a00ff;
  color:white;
  width:100%;
}

/* HEADER */
#header {
  display:flex;
  justify-content:space-between;
  padding:10px 15px;
}

/* AURA */
#aura {
  position:absolute;
  top:50%;
  left:50%;
  width:250px;
  height:250px;
  transform:translate(-50%, -50%);
  border-radius:50%;
  background: radial-gradient(circle, rgba(122,0,255,0.7), transparent 70%);
  filter: blur(40px);
  transition: 0.3s;
}

/* CHAT */
#chatScreen {
  position:relative;
}

#chat {
  flex:1;
  overflow-y:auto;
  padding:15px;
  padding-bottom:80px;
}

.msg {
  margin-bottom:10px;
}

/* INPUT FIXO */
#inputArea {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  padding:10px;
  background:#050310;
}

#inputArea input {
  flex:1;
  margin:0;
}

#inputArea button {
  width:auto;
  margin-left:10px;
}

/* PAYWALL */
#paywall {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  text-align:center;
}
</style></head><body><!-- LOGIN --><div id="login" class="screen active">
  <h2>Entrar no Depy</h2>
  <input id="name" placeholder="Seu nome">
  <button onclick="enter()">Entrar</button>
</div><!-- CHAT --><div id="chatScreen" class="screen">  <div id="header">
    <span id="userName"></span>
    <button onclick="logout()">Sair</button>
  </div>  <div id="aura"></div>  <div id="chat"></div>  <div id="inputArea">
    <input id="input" placeholder="Estou aqui…">
    <button onclick="send()">→</button>
  </div>
</div><!-- PAYWALL --><div id="paywall">
  <div>
    <p>Você atingiu o limite…</p>
    <button onclick="goPro()">Aprofundar conexão — R$29</button>
  </div>
</div><script>
let usage = 0;
const LIMIT = 10;

/* LOGIN */
function enter() {
  const name = document.getElementById("name").value;
  if (!name) return;

  localStorage.setItem("user", name);

  document.getElementById("userName").innerText = name;
  document.getElementById("login").classList.remove("active");
  document.getElementById("chatScreen").classList.add("active");
}

/* LOGOUT */
function logout() {
  localStorage.clear();
  location.reload();
}

/* CHAT */
function send() {
  if (usage >= LIMIT && !isPro()) {
    document.getElementById("paywall").style.display = "flex";
    return;
  }

  const input = document.getElementById("input");
  const msg = input.value;
  if (!msg) return;

  const chat = document.getElementById("chat");

  chat.innerHTML += `<div class="msg">Você: ${msg}</div>`;

  // reação da aura
  const aura = document.getElementById("aura");
  aura.style.transform = "translate(-50%, -50%) scale(1.4)";
  setTimeout(() => {
    aura.style.transform = "translate(-50%, -50%) scale(1)";
  }, 300);

  setTimeout(() => {
    chat.innerHTML += `<div class="msg"><b>Depy:</b> Eu estou aqui com você.</div>`;
    chat.scrollTop = chat.scrollHeight;
  }, 400);

  input.value = "";
  usage++;
}

/* PRO */
function isPro() {
  return localStorage.getItem("pro") === "true";
}

function goPro() {
  window.open("https://www.mercadopago.com.br/subscriptions/checkout?preapproval_plan_id=5adce0811ff746668764283d5a98258d");
}

/* AUTO LOGIN */
window.onload = () => {
  const user = localStorage.getItem("user");
  if (user) {
    document.getElementById("userName").innerText = user;
    document.getElementById("login").classList.remove("active");
    document.getElementById("chatScreen").classList.add("active");
  }
};
</script></body>
</html>
